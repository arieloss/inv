version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: adminpanel_db
    restart: always
    environment:
      POSTGRES_DB: admin_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: adminpanel_app
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/admin_dashboard
    volumes:
      - .:/app

volumes:
  pgdata:
